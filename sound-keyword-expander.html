<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Keyword Expander — 音效關鍵字擴展器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e0f;
  --surface: #161618;
  --surface2: #1e1e21;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --text2: #888884;
  --text3: #555552;
  --accent: #c8f060;
  --accent2: #a8d840;
  --accent-dim: rgba(200,240,96,0.1);
  --accent-dim2: rgba(200,240,96,0.05);
  --red: #ff6b5b;
  --blue: #5b9fff;
  --amber: #ffb347;
  --teal: #4dd9ac;
  --pink: #f06090;
}

html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
  position: relative;
  z-index: 1;
}

/* Header */
header {
  margin-bottom: 3rem;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0.5rem;
}
.logo-dot {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.logo-text {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--text);
}
h1 span { color: var(--accent); }
.subtitle {
  margin-top: 0.75rem;
  font-size: 14px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  font-weight: 300;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  width: fit-content;
}
.tab {
  padding: 7px 18px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  border-radius: 7px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text2);
  transition: all 0.15s;
}
.tab.active {
  background: var(--accent);
  color: #0e0e0f;
  font-weight: 500;
}
.tab:not(.active):hover { color: var(--text); }

/* Panel */
.panel { display: none; }
.panel.active { display: block; }

/* Search box */
.search-wrap {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: var(--accent); }

.search-label {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.search-input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  resize: none;
  line-height: 1.5;
  min-height: 52px;
  max-height: 140px;
}
textarea::placeholder { color: var(--text3); }

.search-btn {
  flex-shrink: 0;
  width: 44px; height: 44px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #0e0e0f;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: background 0.15s, transform 0.1s;
}
.search-btn:hover { background: var(--accent2); }
.search-btn:active { transform: scale(0.95); }
.search-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }

/* Quick examples */
.examples-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 2rem;
}
.example-chip {
  padding: 5px 12px;
  border: 1px solid var(--border2);
  border-radius: 99px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
}
.example-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim2);
}

/* Results */
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.results-meta {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
}
.copy-all-btn {
  padding: 6px 14px;
  border: 1px solid var(--border2);
  border-radius: 7px;
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}
.copy-all-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Dimension block */
.dim-block {
  margin-bottom: 1.25rem;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.dim-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.dim-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dim-name {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.dim-zh {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  margin-left: auto;
}
.dim-body {
  padding: 12px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: var(--surface2);
}

/* Tags */
.kw-tag {
  display: inline-flex;
  flex-direction: column;
  padding: 6px 11px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
  animation: fadeUp 0.3s ease both;
}
.kw-tag:hover { border-color: var(--border2); background: var(--surface2); }
.kw-tag.copied { border-color: var(--accent); background: var(--accent-dim); }
.kw-en {
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  color: var(--text);
  transition: color 0.15s;
}
.kw-zh {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  margin-top: 2px;
  transition: color 0.15s;
}
.kw-tag.copied .kw-en { color: var(--accent); }
.kw-tag.copied .kw-zh { color: var(--accent); opacity: 0.7; }

/* UCS badge */
.ucs-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border: 1px solid rgba(91,159,255,0.3);
  border-radius: 5px;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--blue);
  background: rgba(91,159,255,0.05);
  margin-left: 4px;
  vertical-align: middle;
}

/* Browse panel */
.ucs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.ucs-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s;
  background: var(--surface);
}
.ucs-card:hover { border-color: var(--border2); }
.ucs-card-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ucs-card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ucs-card-name { font-size: 12px; font-weight: 600; }
.ucs-card-zh { font-size: 11px; color: var(--text2); margin-top: 1px; }
.ucs-card-body { padding: 10px 12px; }
.ucs-sub {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  line-height: 1.8;
}

/* Favorites panel */
.fav-empty {
  text-align: center;
  padding: 3rem;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  border: 1px dashed var(--border);
  border-radius: 12px;
}
.fav-list { display: flex; flex-wrap: wrap; gap: 6px; }
.fav-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 11px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text);
}
.fav-tag .remove {
  color: var(--text3);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  transition: color 0.15s;
}
.fav-tag .remove:hover { color: var(--red); }
.fav-actions {
  display: flex;
  gap: 8px;
  margin-top: 1rem;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--accent);
  color: #0e0e0f;
  padding: 8px 20px;
  border-radius: 99px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

  <div class="panel" id="panel-browse">

  </div>

  <!-- FAVORITES PANEL -->
  <div class="panel" id="panel-fav">
    <div id="fav-content"></div>
  </div>
</div>

// ─── State ────────────────────────────────────────────────────────────────────
let favorites = JSON.parse(localStorage.getItem('sfx-favorites') || '[]');

// ─── NL Search ────────────────────────────────────────────────────────────────
function analyzeInput(text) {
  const lower = text.toLowerCase();
  const results = {};

  for (const [dimId, dim] of Object.entries(DIMENSION_MAP)) {
    const matched = [];
    for (const [pattern, kwds] of Object.entries(dim.tokens)) {
      const parts = pattern.split('|');
      if (parts.some(p => lower.includes(p))) {
        kwds.en.forEach((en, i) => {
          matched.push({ en, zh: kwds.zh[i] || '' });
        });
      }
    }
    if (matched.length) results[dimId] = { ...dim, matched };
  }

  // Also check UCS categories
  const ucsMatched = [];
  for (const cat of UCS) {
    const allTokens = [...cat.keywords.en, ...cat.keywords.zh];
    if (allTokens.some(t => lower.includes(t.toLowerCase()))) {
      // Add a few signature keywords
      const sig = cat.keywords.en.slice(0, 4).map((en, i) => ({ en, zh: cat.keywords.zh[i] || '' }));
      ucsMatched.push(...sig);
    }
  }
  if (ucsMatched.length) {
    // dedupe
    const seen = new Set();
    results['ucs'] = {
      label: 'UCS Related', zh: 'UCS 相關分類', color: '#888884',
      matched: ucsMatched.filter(k => { if (seen.has(k.en)) return false; seen.add(k.en); return true; }).slice(0, 12)
    };
  }

  return results;
}

function doNLSearch() {
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  const dims = analyzeInput(q);
  renderResults(q, dims);
}

function fillAndSearch(text) {
  document.getElementById('query').value = text;
  doNLSearch();
}

function renderResults(q, dims) {
  const el = document.getElementById('search-results');
  if (!Object.keys(dims).length) {
    el.innerHTML = `<div style="padding:2rem;text-align:center;font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);border:1px dashed var(--border);border-radius:12px">找不到匹配的分類，試著加入更多描述詞<br><span style="color:var(--text3);font-size:11px;margin-top:4px;display:block">例如加上材質、動作、環境等描述</span></div>`;
    return;
  }

  const allKws = Object.values(dims).flatMap(d => d.matched.map(k => k.en));
  const unique = [...new Set(allKws)];

  let html = `
    <div class="results-header">
      <span class="results-meta">// ${Object.keys(dims).length} 個維度 · ${unique.length} 個關鍵字</span>
      <button class="copy-all-btn" onclick="copyText('${unique.join(', ')}')">複製全部</button>
    </div>
  `;

  let delay = 0;
  for (const [dimId, dim] of Object.entries(dims)) {
    html += `
      <div class="dim-block" style="animation-delay:${delay}ms">
        <div class="dim-header">
          <div class="dim-dot" style="background:${dim.color}"></div>
          <span class="dim-name" style="color:${dim.color}">${dim.label}</span>
          <span class="dim-zh">${dim.zh}</span>
        </div>
        <div class="dim-body">
          ${dim.matched.map((k, i) => `
            <div class="kw-tag" style="animation-delay:${delay + i * 30}ms" onclick="copyTag(this,'${k.en}')">
              <span class="kw-en">${k.en}</span>
              <span class="kw-zh">${k.zh}</span>
            </div>
            <div class="kw-tag" style="animation-delay:${delay + i * 30 + 5}ms; cursor:default; opacity:0.5; font-size:10px" onclick="addFavorite('${k.en}', this)">
              <span class="kw-en" style="font-size:11px">＋收藏</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    delay += 80;
  }

  el.innerHTML = html;
}

// ─── UCS Browse ───────────────────────────────────────────────────────────────
function renderBrowse() {
  const grid = document.getElementById('ucs-grid');
  grid.innerHTML = UCS.map(cat => `
    <div class="ucs-card" onclick="browseCategory('${cat.id}')">
      <div class="ucs-card-header">
        <div class="ucs-card-dot" style="background:${cat.color}"></div>
        <div>
          <div class="ucs-card-name">${cat.name}</div>
          <div class="ucs-card-zh">${cat.zh}</div>
        </div>
      </div>
      <div class="ucs-card-body">
        <div class="ucs-sub">${cat.subs.slice(0,5).join(' · ')}${cat.subs.length > 5 ? ' …' : ''}</div>
      </div>
    </div>
  `).join('');
}

function browseCategory(id) {
  const cat = UCS.find(c => c.id === id);
  if (!cat) return;
  switchTab('search');
  const el = document.getElementById('search-results');
  const allKws = cat.keywords.en;
  el.innerHTML = `
    <div class="results-header">
      <span class="results-meta" style="color:${cat.color}">// ${cat.name} — ${cat.zh}</span>
      <button class="copy-all-btn" onclick="copyText('${allKws.join(', ')}')">複製全部</button>
    </div>
    <div class="dim-block">
      <div class="dim-header">
        <div class="dim-dot" style="background:${cat.color}"></div>
        <span class="dim-name" style="color:${cat.color}">${cat.name}</span>
        <span class="dim-zh">${cat.zh}</span>
        <span class="ucs-badge">UCS · ${cat.id}</span>
      </div>
      <div class="dim-body">
        ${cat.keywords.en.map((en, i) => `
          <div class="kw-tag" onclick="copyTag(this,'${en}')">
            <span class="kw-en">${en}</span>
            <span class="kw-zh">${cat.keywords.zh[i] || ''}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ─── Favorites ────────────────────────────────────────────────────────────────
function addFavorite(word, btn) {
  if (!favorites.includes(word)) {
    favorites.push(word);
    localStorage.setItem('sfx-favorites', JSON.stringify(favorites));
    showToast(`已收藏 "${word}"`);
  }
  renderFavorites();
}

function removeFavorite(word) {
  favorites = favorites.filter(f => f !== word);
  localStorage.setItem('sfx-favorites', JSON.stringify(favorites));
  renderFavorites();
}

function renderFavorites() {
  const el = document.getElementById('fav-content');
  if (!favorites.length) {
    el.innerHTML = `<div class="fav-empty">// 還沒有收藏的關鍵字<br><span style="font-size:11px;margin-top:4px;display:block">點擊搜尋結果裡的「＋收藏」</span></div>`;
    return;
  }
  el.innerHTML = `
    <div style="margin-bottom:1rem;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)">// ${favorites.length} 個收藏關鍵字</div>
    <div class="fav-list">
      ${favorites.map(w => `
        <div class="fav-tag">
          <span onclick="copyText('${w}'); showToast('已複製 ${w}')" style="cursor:pointer">${w}</span>
          <span class="remove" onclick="removeFavorite('${w}')">×</span>
        </div>
      `).join('')}
    </div>
    <div class="fav-actions">
      <button class="copy-all-btn" onclick="copyText('${favorites.join(', ')}')">複製全部 (${favorites.length})</button>
      <button class="copy-all-btn" onclick="if(confirm('清除所有收藏？')){favorites=[];localStorage.removeItem('sfx-favorites');renderFavorites()}">清除全部</button>
    </div>
  `;
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['search','browse','fav'][i] === id);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  if (id === 'fav') renderFavorites();
}

function copyTag(el, word) {
  copyText(word);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1000);
  showToast(`已複製 "${word}"`);
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doNLSearch(); }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
renderBrowse();
</script>
